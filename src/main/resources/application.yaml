spring:
  application:
    name: ego-backend
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/Ego}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:pass}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  security:
    user:
      name: admin
      password: admin

logging:
  level:
    org:
      springframework:
        security: DEBUG

server:
  address: 0.0.0.0
  port: 5190

security:
  licensed-apps:
    - app1
    - app2
    - app3

jwt:
  secret: ${JWT_SECRET:"change_me_for_production"}
  expiration: ${JWT_EXPIRATION:864000000}